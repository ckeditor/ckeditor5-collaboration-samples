packages:
  - "*/"
  - "!_*/"
  - "!.*/"
  - "!build/"
  - "!node_modules/"

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lmdb: false
  msgpackr-extract: false
  protobufjs: true
  sharp: true
  snyk: true
  unrs-resolver: true

overrides:
  'postcss@^8': '^8.5.10'
  'tar@^6': '^7.5.11'
  'uuid@^9': '^14.0.0'
  'ws@^8': '^8.21.1'
  'esbuild@^0.27': '^0.28.1'
  'esbuild@^0.28': '^0.28.1'
  'protobufjs@^7': '^7.6.4'
  'vite@^6': '^6.4.3'
  '@babel/core@^7': '^7.29.7'
  'piscina@^4': '^4.9.3'
  'brace-expansion@^1': '^1.1.16'
  'brace-expansion@^2': '^2.1.2'
  'brace-expansion@^5': '^5.0.7'
  'immutable@^5': '^5.1.8'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'
  - 'ws' # Remove after 2026-07-17.

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
ignoreWorkspaceCycles: true
verifyDepsBeforeRun: false
